<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoLove - Confirm Status</title>
  <link rel="stylesheet" href="/styles/globals.css" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 2rem 1.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #222;
    }
    p {
      color: #555;
      margin-bottom: 2rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .safe {
      background: #22c55e;
      color: #fff;
    }
    .passed {
      background: #ef4444;
      color: #fff;
    }
    @media (max-width: 500px) {
      .container {
        padding: 1.5rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Confirm User Status</h1>
    <p>Please confirm the status of your contact. Your response helps us keep their wishes safe.</p>
    <div class="actions">
      <button class="safe" onclick="submitStatus('safe')">I'm Safe</button>
      <button class="passed" onclick="submitStatus('passed')">They've Passed Away</button>
    </div>
    <div id="result" style="margin-top:2rem;"></div>
  </div>
  <script>
    function getQueryParams() {
      const params = {};
      window.location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(m,key,value) {
        params[key] = decodeURIComponent(value);
      });
      return params;
    }
    async function submitStatus(status) {
      const params = getQueryParams();
      const email = params.email || '';
      const token = params.token || '';
      document.getElementById('result').innerHTML = 'Submitting...';
      try {
        const res = await fetch('/api/contact/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, status })
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('result').innerHTML = `<span style='color:#22c55e;'>${data.message || 'Thank you for your response.'}</span>`;
        } else {
          document.getElementById('result').innerHTML = `<span style='color:#ef4444;'>${data.error || 'Something went wrong.'}</span>`;
        }
      } catch (e) {
        document.getElementById('result').innerHTML = `<span style='color:#ef4444;'>Network error. Please try again later.</span>`;
      }
    }
  </script>
</body>
</html>
