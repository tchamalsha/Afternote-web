<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EternalNote — Confirmation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 40px 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #C4964A;
      border-radius: 16px;
      color: white;
      font-size: 26px;
      font-weight: 700;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .card h2 {
      font-size: 22px;
      color: #1A1A1A;
      margin-bottom: 12px;
    }

    .card p {
      font-size: 15px;
      color: #6B6560;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* Loading */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #F0ECE6;
      border-top-color: #C4964A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Confirm choice (confirm-status only) */
    .choices {
      margin-top: 24px;
    }

    .choices p.hint {
      font-size: 13px;
      color: #9E9895;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-safe {
      background: #4CAF50;
    }

    .btn-passed {
      background: #E53935;
    }

    .btn-imsafe {
      background: #4CAF50;
    }

    /* Result states */
    .result-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .result-icon.success {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .result-icon.error {
      background: #FFEBEE;
      color: #C62828;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #9E9895;
    }

    /* Hidden by default */
    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">A</div>
    </div>

    <!-- 1. Loading state -->
    <div id="state-loading" class="card">
      <h2>Processing…</h2>
      <div class="spinner"></div>
      <p>Please wait while we verify your response.</p>
    </div>

    <!-- 2. Confirm-status choice (when no status param given) -->
    <div id="state-choose" class="card hidden">
      <h2>We need your help</h2>
      <p id="choose-text"></p>
      <div class="choices">
        <p class="hint">Please select one option below:</p>
        <button class="btn btn-safe" onclick="submitStatus('safe')">✓&nbsp; They are safe</button>
        <button class="btn btn-passed" onclick="submitStatus('passed')">✗&nbsp; They have passed away</button>
      </div>
    </div>

    <!-- 3. Success -->
    <div id="state-success" class="card hidden">
      <div class="result-icon success">✓</div>
      <h2 id="success-title">Thank You</h2>
      <p id="success-msg"></p>
    </div>

    <!-- 4. Error -->
    <div id="state-error" class="card hidden">
      <div class="result-icon error">✗</div>
      <h2 id="error-title">Something Went Wrong</h2>
      <p id="error-msg"></p>
    </div>

    <div class="footer">EternalNote &mdash; Words that stay</div>
  </div>

  <script>
    // ─── Config ────────────────────────────────────────────────────
    // Supabase Edge Functions are public and don't require authentication
    const SUPABASE_URL = 'https://furvzhpgaksfavkpimpv.supabase.co';
    const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;

    // ─── Parse URL params ──────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');   // 'confirm-status' | 'im-safe'
    const token = params.get('token');
    const status = params.get('status');   // 'safe' | 'passed' | null

    // ─── UI helpers ────────────────────────────────────────────────
    function show(id) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function showSuccess(title, msg) {
      document.getElementById('success-title').textContent = title;
      document.getElementById('success-msg').textContent = msg;
      show('state-success');
    }
    function showError(title, msg) {
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent = msg;
      show('state-error');
    }

    // ─── Call Edge Function ────────────────────────────────────────
    // Supabase Edge Functions are public endpoints
    async function callEdgeFunction(endpoint, queryParams) {
      const qs = new URLSearchParams(queryParams).toString();
      const url = `${FUNCTIONS_URL}/${endpoint}?${qs}`;

      console.log(`[callEdgeFunction] Calling: ${url}`);

      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'text/html',
          },
        });

        console.log(`[callEdgeFunction] Response status: ${res.status}`);
        const body = await res.text();
        console.log(`[callEdgeFunction] Response length: ${body.length}`);

        return { ok: res.ok, status: res.status, body };
      } catch (err) {
        console.error(`[callEdgeFunction] Error:`, err);
        throw err;
      }
    }

    // ─── confirm-status: submit choice ─────────────────────────────
    async function submitStatus(chosenStatus) {
      // Disable buttons
      document.querySelectorAll('.btn').forEach(b => b.disabled = true);
      show('state-loading');

      try {
        console.log(`[submitStatus] Submitting status: ${chosenStatus} with token: ${token}`);
        const result = await callEdgeFunction('confirm-status', { token, status: chosenStatus });

        if (result.ok) {
          const msg = chosenStatus === 'safe'
            ? 'You have confirmed that they are safe. Thank you for your response.'
            : 'Your response has been recorded. Thank you for helping us during this difficult time.';
          showSuccess('Thank You', msg);
        } else {
          // Try to extract title and message from HTML response
          const titleMatch = result.body.match(/<h1[^>]*>([^<]+)<\/h1>/) || result.body.match(/<h2[^>]*>([^<]+)<\/h2>/);
          const msgMatch = result.body.match(/<p[^>]*>([^<]+)<\/p>/);
          showError(
            titleMatch ? titleMatch[1] : `Error (${result.status})`,
            msgMatch ? msgMatch[1] : 'Something went wrong. Please try again.',
          );
        }
      } catch (e) {
        console.error('[submitStatus] Exception:', e);
        showError('Connection Error', `${e.message}. Please check your connection and try again.`);
      }
    }

    // ─── im-safe: auto-submit ──────────────────────────────────────
    async function handleImSafe() {
      show('state-loading');
      try {
        console.log(`[handleImSafe] Processing with token: ${token}`);
        const result = await callEdgeFunction('im-safe', { token });

        if (result.ok) {
          showSuccess(
            'Welcome Back!',
            'Your check-in has been confirmed and your account is safe. All pending processes have been cancelled and your check-in cycle has been reset.',
          );
        } else {
          const titleMatch = result.body.match(/<h1[^>]*>([^<]+)<\/h1>/) || result.body.match(/<h2[^>]*>([^<]+)<\/h2>/);
          const msgMatch = result.body.match(/<p[^>]*>([^<]+)<\/p>/);
          showError(
            titleMatch ? titleMatch[1] : `Error (${result.status})`,
            msgMatch ? msgMatch[1] : 'Something went wrong. Please try again.',
          );
        }
      } catch (e) {
        console.error('[handleImSafe] Exception:', e);
        showError('Connection Error', `${e.message}. Please check your connection and try again.`);
      }
    }

    // ─── Entry point ───────────────────────────────────────────────
    (function init() {
      console.log(`[init] URL params - action: ${action}, token: ${token}, status: ${status}`);

      if (!token) {
        showError('Invalid Link', 'This link is missing required parameters. Please use the link from your email.');
        return;
      }

      if (action === 'im-safe') {
        // Final warning "I'm Safe" — auto-submit
        console.log('[init] Starting im-safe flow');
        handleImSafe();
      } else if (action === 'confirm-status') {
        if (status) {
          // Status provided in URL — auto-submit
          console.log(`[init] Auto-submitting with status: ${status}`);
          submitStatus(status);
        } else {
          // Show choice buttons (fallback)
          document.getElementById('choose-text').textContent =
            'You were listed as a trusted contact. Please confirm their status below.';
          show('state-choose');
        }
      } else {
        showError('Invalid Link', 'This link is not recognized. Please use the link from your email.');
      }
    })();
  </script>
</body>

</html>
