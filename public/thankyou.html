<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EternalNote — Thank You</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Logo ─────────────────────────────────── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: #C4964A;
      border-radius: 12px;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    /* ── Card ─────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0, 0, 0, 0.04);
      text-align: center;
      max-width: 520px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* coloured top-border accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent, #C4964A);
      border-radius: 24px 24px 0 0;
    }

    /* ── Icon bubble ──────────────────────────── */
    .icon-bubble {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
      background: var(--accent-light, #FFF3E0);
    }

    /* ── Typography ───────────────────────────── */
    .card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.3;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .card p {
      font-size: 15px;
      color: #6B6560;
      line-height: 1.75;
    }

    /* ── Divider ──────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid #F0ECE6;
      margin: 28px 0;
    }

    /* ── Footer ───────────────────────────────── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #B0AAA4;
      letter-spacing: 0.02em;
    }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 480px) {
      .card {
        padding: 32px 24px 28px;
        border-radius: 20px;
      }

      .card h2 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="logo">
    <div class="logo-mark">E</div>
    <span class="logo-name">EternalNote</span>
  </div>

  <div class="card" id="card">
    <div class="icon-bubble" id="icon"></div>
    <h2 id="heading"></h2>
    <p id="body-text"></p>
    <hr class="divider">
    <p style="font-size:13px; color:#B0AAA4;">You may now close this page.</p>
  </div>

  <div class="footer">EternalNote &mdash; Words that stay</div>

  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var status  = (params.get('status')  || '').trim().toLowerCase();
      var reason  = (params.get('reason')  || '').trim().toLowerCase();

      var card    = document.getElementById('card');
      var icon    = document.getElementById('icon');
      var heading = document.getElementById('heading');
      var body    = document.getElementById('body-text');

      // ── Case 3: already confirmed (either status) ──────────
      if (reason === 'already_confirmed') {
        card.style.setProperty('--accent',       '#9E9895');
        card.style.setProperty('--accent-light', '#F3F1F0');
        icon.textContent    = '🔒';
        heading.textContent = 'Already Recorded';
        body.textContent    =
          'Your response was already saved — no need to click again. '
          + 'Thank you for caring enough to check.';
        return;
      }

      // ── Case 1: safe ───────────────────────────────────────
      if (status === 'safe') {
        card.style.setProperty('--accent',       '#4CAF50');
        card.style.setProperty('--accent-light', '#E8F5E9');
        icon.textContent    = '✓';
        heading.textContent = 'Thank You for Confirming ✓';
        body.textContent    =
          'You\'ve let us know they\'re safe and well. Their account has been reset '
          + 'and no messages will be delivered. Your care means everything.';
        return;
      }

      // ── Case 2: passed ─────────────────────────────────────
      if (status === 'passed') {
        card.style.setProperty('--accent',       '#7E57C2');
        card.style.setProperty('--accent-light', '#EDE7F6');
        icon.textContent    = '🕯️';
        heading.textContent = 'Thank You for Letting Us Know';
        body.innerHTML      =
          'We\'re so sorry for your loss. You\'ve honoured their wishes by responding. '
          + 'Their personal messages are now being delivered to the people they chose. '
          + '<br><br>They thought of you. 🤍';
        return;
      }

      // ── Fallback ───────────────────────────────────────────
      card.style.setProperty('--accent',       '#C4964A');
      card.style.setProperty('--accent-light', '#FFF3E0');
      icon.textContent    = '♡';
      heading.textContent = 'Thank You';
      body.textContent    = 'Your response has been recorded.';
    })();
  </script>

</body>
</html>
